<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DemocraGPT – Nächste Termine</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --card: #ffffff;
      --text: #2f3437;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.08);
      --today-bg: #dbeafe;
      --today-border: #60a5fa;
      --error-bg: #fff1f2;
      --error-text: #9f1239;
      --error-border: #fecdd3;
      --radius: 14px;
      --shadow: 0 4px 18px rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 14px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 700px;
      margin: 0 auto;
    }

    .title {
      margin: 0 0 4px 0;
      font-size: 22px;
      font-weight: 700;
    }

    .subtitle {
      margin: 0 0 12px 0;
      font-size: 13px;
      color: var(--muted);
    }

    .status {
      margin: 0 0 12px 0;
      font-size: 13px;
      color: var(--muted);
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .event {
      background: var(--card);
      border: 1px solid var(--line);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px 14px;
    }

    .event.today {
      background: var(--today-bg);
      border: 2px solid var(--today-border);
      border-left: 4px solid var(--accent);
    }

    .event-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .event-date {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
    }

    .today-badge {
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      background: rgba(37, 99, 235, 0.12);
    }

    .event-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 4px;
    }

    .event-time {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .event-meta {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
      margin-top: 2px;
    }

    .empty,
    .error {
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.45;
    }

    .empty {
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--muted);
    }

    .error {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-text);
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      background: rgba(0,0,0,0.05);
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="status" class="status">Lade Termine …</div>
    <div id="calendar"></div>
  </div>

  <script>
    const CALENDAR_ID = "c_e81f71776b2d2abd7f0852cf7f5cbc512b14a84dc1d53e5725da0e86bd2053a7@group.calendar.google.com";
    const API_KEY = "AIzaSyAN-gC7k2tEqUXzHdpgS2yvRexIep__bWM";
    const TIME_ZONE = "Europe/Berlin";
    const MAX_RESULTS = 3;
    const MONTHS_AHEAD = 6;

    const statusEl = document.getElementById("status");
    const calendarEl = document.getElementById("calendar");

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function isAllDayEvent(event) {
      return Boolean(event.start?.date);
    }

    function getEventStartDate(event) {
      return new Date(event.start.dateTime || event.start.date);
    }

    function isTodayInBerlin(date) {
      const formatter = new Intl.DateTimeFormat("en-CA", {
        timeZone: TIME_ZONE,
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      });

      return formatter.format(date) === formatter.format(new Date());
    }

    function formatEventDate(date) {
      return new Intl.DateTimeFormat("de-DE", {
        weekday: "short",
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        timeZone: TIME_ZONE
      }).format(date);
    }

    function formatEventTime(event) {
      if (isAllDayEvent(event)) return "Ganztägig";

      const start = new Intl.DateTimeFormat("de-DE", {
        hour: "2-digit",
        minute: "2-digit",
        timeZone: TIME_ZONE
      }).format(new Date(event.start.dateTime));

      const end = event.end?.dateTime
        ? new Intl.DateTimeFormat("de-DE", {
            hour: "2-digit",
            minute: "2-digit",
            timeZone: TIME_ZONE
          }).format(new Date(event.end.dateTime))
        : "";

      return end ? `${start}–${end}` : start;
    }

    function getTimeMaxISO() {
      const now = new Date();
      const future = new Date(now);
      future.setMonth(future.getMonth() + MONTHS_AHEAD);
      return future.toISOString();
    }

    async function fetchEvents() {
      const url = new URL(
        `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events`
      );

      url.searchParams.set("key", API_KEY);
      url.searchParams.set("singleEvents", "true");
      url.searchParams.set("orderBy", "startTime");
      url.searchParams.set("timeMin", new Date().toISOString());
      url.searchParams.set("timeMax", getTimeMaxISO());
      url.searchParams.set("timeZone", TIME_ZONE);
      url.searchParams.set("maxResults", String(MAX_RESULTS));

      const response = await fetch(url.toString());
      const data = await response.json();

      if (!response.ok) {
        throw new Error(data?.error?.message || `${response.status} ${response.statusText}`);
      }

      return data.items || [];
    }

    function renderEvents(events) {
      const list = document.createElement("div");
      list.className = "list";

      if (events.length === 0) {
        list.innerHTML = `<div class="empty">In den nächsten ${MONTHS_AHEAD} Monaten sind keine Termine eingetragen.</div>`;
        calendarEl.innerHTML = "";
        calendarEl.appendChild(list);
        return;
      }

      for (const event of events) {
        const startDate = getEventStartDate(event);
        const isToday = isTodayInBerlin(startDate);

        const item = document.createElement("div");
        item.className = `event${isToday ? " today" : ""}`;

        item.innerHTML = `
          <div class="event-top">
            <div class="event-date">${escapeHtml(formatEventDate(startDate))}</div>
            ${isToday ? `<div class="today-badge">Heute</div>` : ""}
          </div>
          <div class="event-title">${escapeHtml(event.summary || "(Ohne Titel)")}</div>
          <div class="event-time">${escapeHtml(formatEventTime(event))}</div>
          ${event.location ? `<div class="event-meta">${escapeHtml(event.location)}</div>` : ""}
        `;

        list.appendChild(item);
      }

      calendarEl.innerHTML = "";
      calendarEl.appendChild(list);
    }

    async function init() {
      try {
        if (!API_KEY || API_KEY === "DEIN_GOOGLE_API_KEY") {
          statusEl.innerHTML = `
            <div class="error">
              Bitte zuerst hier deinen Key eintragen:<br><br>
              <code>const API_KEY = "DEIN_GOOGLE_API_KEY";</code>
            </div>
          `;
          return;
        }

        const events = await fetchEvents();
        statusEl.textContent = events.length === 1
          ? "1 kommender Termin"
          : `${events.length} kommende Termine`;

        renderEvents(events);
      } catch (error) {
        console.error(error);
        statusEl.innerHTML = `
          <div class="error">
            Die Termine konnten nicht geladen werden.<br><br>
            Hinweis:<br>
            <code>${escapeHtml(error.message)}</code>
          </div>
        `;
      }
    }

    init();
  </script>
</body>
</html>
