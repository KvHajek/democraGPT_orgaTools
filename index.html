<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DemocraGPT Kalender</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --card: #ffffff;
      --text: #2f3437;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.08);
      --today-bg: #dbeafe;
      --today-border: #60a5fa;
      --today-event-bg: #bfdbfe;
      --shadow: 0 4px 18px rgba(0,0,0,0.06);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 20px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 18px;
    }

    .title {
      margin: 0 0 6px 0;
      font-size: 28px;
      font-weight: 700;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .status {
      margin: 16px 0 20px 0;
      font-size: 14px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 14px;
    }

    .day-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-height: 220px;
      padding: 14px;
      display: flex;
      flex-direction: column;
    }

    .day-card.today {
      background: var(--today-bg);
      border: 2px solid var(--today-border);
    }

    .day-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 12px;
    }

    .weekday {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .date {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
    }

    .today-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      background: rgba(37, 99, 235, 0.12);
    }

    .count {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      margin-top: 2px;
    }

    .events {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }

    .event {
      border-left: 3px solid var(--accent);
      background: var(--accent-soft);
      border-radius: 10px;
      padding: 8px 10px;
    }

    .event.today-event {
      background: var(--today-event-bg);
    }

    .event-time {
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 3px;
    }

    .event-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 2px;
    }

    .event-meta {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.3;
    }

    .empty {
      margin-top: auto;
      color: var(--muted);
      font-size: 13px;
      font-style: italic;
    }

    .error {
      background: #fff1f2;
      color: #9f1239;
      border: 1px solid #fecdd3;
      border-radius: 12px;
      padding: 12px 14px;
      line-height: 1.45;
    }

    .footer {
      margin-top: 18px;
      font-size: 12px;
      color: var(--muted);
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      background: rgba(0,0,0,0.04);
      padding: 2px 6px;
      border-radius: 6px;
    }

    @media (max-width: 1200px) {
      .grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 800px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      body { padding: 12px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1 class="title">DemocraGPT Kalender</h1>
      <p class="subtitle">Laufende Woche und nächste Woche · Europe/Berlin</p>
    </div>

    <div id="status" class="status">Lade Termine …</div>
    <div id="calendar"></div>

    <div class="footer">
      ICS-basiert · geeignet für Einbettung in Notion
    </div>
  </div>

  <script src="https://unpkg.com/ical.js/dist/ical.min.js"></script>
  <script>
    const TIME_ZONE = "Europe/Berlin";
    const DAYS_TO_SHOW = 14;

    // Hier DEINEN öffentlichen ICS-Link eintragen:
    const ICS_URL = "https://calendar.google.com/calendar/ical/c_e81f71776b2d2abd7f0852cf7f5cbc512b14a84dc1d53e5725da0e86bd2053a7%40group.calendar.google.com/public/basic.ics";

    // Öffentlicher Proxy für CORS.
    // Für stabilen Einsatz besser später durch eigenen kleinen Proxy ersetzen.
    const CORS_PROXY = "https://cors.isomorphic-git.org/";

    const statusEl = document.getElementById("status");
    const calendarEl = document.getElementById("calendar");

    function formatBerlinParts(date) {
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: TIME_ZONE,
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        weekday: "short",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).formatToParts(date);

      const get = (type) => parts.find(p => p.type === type)?.value || "";
      return {
        year: Number(get("year")),
        month: Number(get("month")),
        day: Number(get("day")),
        weekday: get("weekday"),
        hour: get("hour"),
        minute: get("minute")
      };
    }

    function createUTCDateFromBerlinDate(y, m, d) {
      return new Date(Date.UTC(y, m - 1, d));
    }

    function getTodayBerlin() {
      const now = new Date();
      const p = formatBerlinParts(now);
      return createUTCDateFromBerlinDate(p.year, p.month, p.day);
    }

    function getStartOfWeekBerlin() {
      const today = getTodayBerlin();
      const day = today.getUTCDay(); // So=0, Mo=1
      const diff = day === 0 ? -6 : 1 - day;
      const monday = new Date(today);
      monday.setUTCDate(today.getUTCDate() + diff);
      return monday;
    }

    function addDays(date, days) {
      const d = new Date(date);
      d.setUTCDate(d.getUTCDate() + days);
      return d;
    }

    function isoDateKey(dateUTC) {
      return dateUTC.toISOString().slice(0, 10);
    }

    function isSameUTCDate(a, b) {
      return a.getUTCFullYear() === b.getUTCFullYear()
        && a.getUTCMonth() === b.getUTCMonth()
        && a.getUTCDate() === b.getUTCDate();
    }

    function weekdayLabel(dateUTC) {
      return new Intl.DateTimeFormat("de-DE", {
        weekday: "short",
        timeZone: TIME_ZONE
      }).format(dateUTC);
    }

    function dateLabel(dateUTC) {
      return new Intl.DateTimeFormat("de-DE", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        timeZone: TIME_ZONE
      }).format(dateUTC);
    }

    function timeLabel(date) {
      return new Intl.DateTimeFormat("de-DE", {
        hour: "2-digit",
        minute: "2-digit",
        timeZone: TIME_ZONE
      }).format(date);
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function stripHtml(html) {
      const tmp = document.createElement("div");
      tmp.innerHTML = html || "";
      return (tmp.textContent || tmp.innerText || "").trim();
    }

    function getRangeDates() {
      const start = getStartOfWeekBerlin();
      const end = addDays(start, DAYS_TO_SHOW);
      return { start, end };
    }

    async function fetchICS() {
      if (!ICS_URL || ICS_URL === "DEIN_ICS_LINK_HIER") {
        throw new Error("Bitte zuerst den öffentlichen ICS-Link eintragen.");
      }

      const response = await fetch(CORS_PROXY + ICS_URL);
      if (!response.ok) {
        throw new Error(`ICS konnte nicht geladen werden: ${response.status}`);
      }

      return await response.text();
    }

    function eventOccursInRange(event, rangeStart, rangeEnd) {
      const eventStart = event.startDate.toJSDate();
      return eventStart < rangeEnd && eventStart >= rangeStart;
    }

    function expandRecurringEvents(vcalendar, rangeStart, rangeEnd) {
      const vevents = vcalendar.getAllSubcomponents("vevent");
      const allEvents = [];

      for (const vevent of vevents) {
        const event = new ICAL.Event(vevent);

        if (event.isRecurrenceException()) continue;

        if (event.isRecurring()) {
          const iterator = event.iterator();
          let next;
          let count = 0;

          while ((next = iterator.next())) {
            count++;
            if (count > 500) break;

            const occurrenceDate = next.toJSDate();
            if (occurrenceDate >= rangeEnd) break;
            if (occurrenceDate < rangeStart) continue;

            const occurrence = event.getOccurrenceDetails(next);

            allEvents.push({
              summary: event.summary || "(Ohne Titel)",
              description: event.description || "",
              location: event.location || "",
              start: occurrence.startDate.toJSDate(),
              end: occurrence.endDate.toJSDate(),
              allDay: occurrence.startDate.isDate
            });
          }
        } else {
          if (eventOccursInRange(event, rangeStart, rangeEnd)) {
            allEvents.push({
              summary: event.summary || "(Ohne Titel)",
              description: event.description || "",
              location: event.location || "",
              start: event.startDate.toJSDate(),
              end: event.endDate ? event.endDate.toJSDate() : null,
              allDay: event.startDate.isDate
            });
          }
        }
      }

      return allEvents;
    }

    function getEventDateKey(event) {
      const p = formatBerlinParts(event.start);
      return `${String(p.year).padStart(4, "0")}-${String(p.month).padStart(2, "0")}-${String(p.day).padStart(2, "0")}`;
    }

    function sortEvents(events) {
      return [...events].sort((a, b) => {
        if (a.allDay && !b.allDay) return -1;
        if (!a.allDay && b.allDay) return 1;
        return a.start.getTime() - b.start.getTime();
      });
    }

    function formatEventTime(event) {
      if (event.allDay) return "Ganztägig";

      const start = timeLabel(event.start);
      const end = event.end ? timeLabel(event.end) : "";
      return end ? `${start}–${end}` : start;
    }

    function groupEventsByDay(events) {
      const map = new Map();
      for (const event of events) {
        const key = getEventDateKey(event);
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(event);
      }

      for (const [key, dayEvents] of map.entries()) {
        map.set(key, sortEvents(dayEvents));
      }

      return map;
    }

    function renderCalendar(events) {
      const start = getStartOfWeekBerlin();
      const today = getTodayBerlin();
      const grouped = groupEventsByDay(events);

      const grid = document.createElement("div");
      grid.className = "grid";

      for (let i = 0; i < DAYS_TO_SHOW; i++) {
        const day = addDays(start, i);
        const key = isoDateKey(day);
        const dayEvents = grouped.get(key) || [];
        const isToday = isSameUTCDate(day, today);

        const card = document.createElement("div");
        card.className = `day-card${isToday ? " today" : ""}`;

        const top = document.createElement("div");
        top.className = "day-top";

        const left = document.createElement("div");
        left.innerHTML = `
          <div class="weekday">${escapeHtml(weekdayLabel(day))}</div>
          <div class="date">${escapeHtml(dateLabel(day))}</div>
          ${isToday ? `<div class="today-badge">Heute</div>` : ""}
        `;

        const count = document.createElement("div");
        count.className = "count";
        count.textContent = dayEvents.length === 1 ? "1 Termin" : `${dayEvents.length} Termine`;

        top.appendChild(left);
        top.appendChild(count);
        card.appendChild(top);

        if (dayEvents.length > 0) {
          const eventsEl = document.createElement("div");
          eventsEl.className = "events";

          dayEvents.forEach(event => {
            const item = document.createElement("div");
            item.className = `event${isToday ? " today-event" : ""}`;

            const location = event.location
              ? `<div class="event-meta">${escapeHtml(event.location)}</div>`
              : "";

            const plainDesc = stripHtml(event.description);
            const desc = plainDesc
              ? `<div class="event-meta">${escapeHtml(plainDesc.slice(0, 90))}${plainDesc.length > 90 ? " …" : ""}</div>`
              : "";

            item.innerHTML = `
              <div class="event-time">${escapeHtml(formatEventTime(event))}</div>
              <div class="event-title">${escapeHtml(event.summary)}</div>
              ${location}
              ${desc}
            `;

            eventsEl.appendChild(item);
          });

          card.appendChild(eventsEl);
        } else {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "Keine Termine";
          card.appendChild(empty);
        }

        grid.appendChild(card);
      }

      calendarEl.innerHTML = "";
      calendarEl.appendChild(grid);
    }

    async function init() {
      try {
        const { start, end } = getRangeDates();

        const icsText = await fetchICS();
        const jcalData = ICAL.parse(icsText);
        const vcalendar = new ICAL.Component(jcalData);

        const events = expandRecurringEvents(vcalendar, start, end);
        statusEl.textContent = `Geladen: ${events.length} Termine`;
        renderCalendar(events);
      } catch (error) {
        console.error(error);
        statusEl.innerHTML = `
          <div class="error">
            Die ICS-Termine konnten nicht geladen werden.<br><br>
            Prüfe bitte:
            <br>– Ist der Kalender wirklich öffentlich?
            <br>– Ist der ICS-Link korrekt?
            <br>– Blockiert der verwendete Proxy den Abruf?
            <br><br>
            Hinweis:
            <br><code>${escapeHtml(error.message)}</code>
          </div>
        `;
      }
    }

    init();
  </script>
</body>
</html>
